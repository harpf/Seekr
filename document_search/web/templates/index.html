<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Document Search</title><link rel="stylesheet" href="/static/styles.css"/></head><body><main class="container"><h1>Document Search</h1>
<section class="card"><h2>Login</h2><input id="username" placeholder="username" value="admin"/><input id="password" type="password" placeholder="password"/><button onclick="login()">Login</button><pre id="loginResult"></pre></section>
<section class="card"><h2>Initial Configuration</h2><input id="cfgDb" placeholder="/data/document_index.db"/><input id="cfgExt" placeholder=".pdf,.docx,.pptx,.txt"/><input id="cfgExcludeDirs" placeholder=".git,node_modules,__pycache__,.venv,temp"/><input id="cfgExcludePatterns" placeholder="~$*,*.tmp"/><input id="cfgMaxSize" placeholder="100"/><button onclick="loadConfig()">Load</button><button onclick="saveConfig()">Save</button><pre id="configResult"></pre></section>
<section class="card"><h2>Upload Document</h2><input id="uploadFile" type="file"/><input id="uploadPath" placeholder="incoming/2026"/><input id="uploadTags" placeholder="invoice,customer-a"/><textarea id="uploadMeta" placeholder="{"customer":"ACME","doc_type":"invoice"}"></textarea><button onclick="uploadDocument()">Upload</button><pre id="uploadResult"></pre></section><section class="card"><h2>Index Documents</h2><input id="paths" placeholder="/documents"/><button onclick="startIndex()">Start Async Index</button><pre id="indexResult"></pre></section>
<section class="card"><h2>System Update</h2><button onclick="runUpdate()">Run Update</button><pre id="updateResult"></pre></section><section class="card"><h2>Search Filters</h2><input id="query" placeholder="wartung AND anlage"/><input id="filetype" placeholder="pdf/docx/pptx/txt"/><input id="pathFilter" placeholder="/documents/customer"/><input id="blockType" placeholder="page/paragraph/table/slide"/><input id="modifiedFrom" placeholder="2026-01-01T00:00:00+00:00"/><input id="modifiedTo" placeholder="2026-12-31T23:59:59+00:00"/><button onclick="runSearch()">Search</button><div id="results"></div></section>
</main><script src="/static/app.js"></script></body></html>
