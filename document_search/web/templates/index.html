<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Document Search</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="hero card">
        <h1>Document Search</h1>
        <p class="muted">A document intelligence workspace with dedicated pages for each task.</p>
      </header>

      <section class="card">
        <h2>Login</h2>
        <div class="grid-2">
          <label>Username<input id="username" placeholder="username" value="admin" /></label>
          <label>Password<input id="password" type="password" placeholder="password" /></label>
        </div>
        <button class="btn" onclick="login()">Login</button>
        <p id="loginResult" class="status"></p>
      </section>

      <section id="appPanel" class="card hidden">
        <h2>Go to</h2>
        <div class="grid-3">
          <a class="nav-card" href="/search">Search Documents</a>
          <a class="nav-card" href="/ingest">Upload & Index</a>
          <a class="nav-card" href="/config">Configuration</a>
        </div>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
